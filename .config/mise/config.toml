[tools]
actionlint = "1.7.12"
aws-cli = "2.35.16"
aws-vault = "7.12.5"
bat = "0.26.1"
difftastic = "0.69.0"
fzf = "0.74.0"
gh = "2.96.0"
git-lfs = "3.7.1"
go = "1.26.5"
jq = "1.8.2"
node = "26.4.0"
op = "2.34.1"
ripgrep = "15.1.0"
ruby = "4.0"
rust = "1.96.1"
terraform = "1.15.7"
tflint = "0.63.1"
yq = "4.53.3"
"aqua:awslabs/git-secrets" = "1.3.0"
"gem:fasti" = "latest"
"gem:gemoji-cli" = "latest"


[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby"]
minimum_release_age = "3d"

[settings.ruby]
verbose_install = true
default_packages_file = "~/.config/mise/default-gems"
ruby_build_opts = "--disable-install-doc"

[env]
MISE_NODE_DEFAULT_PACKAGES_FILE = "{{ [config_root] | concat(with='.config/mise/default-npm-packages') | join_path }}"
