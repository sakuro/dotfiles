[tools]
node = "latest"
op = "latest"
ruby = "4.0"
rust = "latest"
"aqua:aws/aws-cli" = "2.34.48"
"aqua:cli/cli" = "v2.86.0"
"aqua:jqlang/jq" = "jq-1.8.1"
"aqua:Wilfred/difftastic" = "0.69.0"
"aqua:kubernetes/kubernetes/kubectl" = "v1.35.0"
"aqua:BurntSushi/ripgrep" = "15.1.0"
"aqua:junegunn/fzf" = "v0.67.0"
"aqua:sharkdp/bat" = "v0.26.1"
"aqua:git-lfs/git-lfs" = "v3.7.1"
"aqua:awslabs/git-secrets" = "1.3.0"
"aqua:astral-sh/uv" = "0.11.14"
"aqua:hashicorp/terraform" = "v1.14.4"
"aqua:terraform-linters/tflint" = "v0.61.0"
"aqua:mikefarah/yq" = "v4.52.2"
"aqua:rhysd/actionlint" = "v1.7.11"
"aqua:ByteNess/aws-vault" = "v7.9.3"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby"]

[settings.ruby]
verbose_install = true
default_packages_file = "~/.config/mise/default-gems"
ruby_build_opts = "--disable-install-doc"

[env]
MISE_NODE_DEFAULT_PACKAGES_FILE = "{{ [config_root] | concat(with='.config/mise/default-npm-packages') | join_path }}"


